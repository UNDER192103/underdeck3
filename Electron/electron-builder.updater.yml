appId: "com.udr.underdeck"
productName: "Under Deck"
copyright: "Copyright (c) 2024 ${author}"

electronVersion: "40.8.0"
nodeGypRebuild: false
buildDependenciesFromSource: true
npmRebuild: false

files:
  - "dist/**/*"
  - "package.json"
  - from: "node_modules/call-bind-apply-helpers"
    to: "node_modules/call-bind-apply-helpers"
    filter:
      - "**/*"
  - "node_modules/**/*"
  - from: "assets"
    to: "assets"
    filter:
      - "**/*"
  - from: "src/renderer"
    to: "renderer"
    filter:
      - "**/*"
  - "!src/**/*"
  - "!tsconfig.json"
  - "!electron-builder*.yml"

asar: false

win:
  target:
    - target: "nsis"
      arch: ["x64"]
  requestedExecutionLevel: "asInvoker"
  icon: "assets/img/icon.ico"

nsis:
  oneClick: true
  allowToChangeInstallationDirectory: false
  installerIcon: "assets/img/icon.ico"
  uninstallerIcon: "assets/img/icon.ico"
  installerHeaderIcon: "assets/img/icon.ico"
  license: "LICENSE.md"
  artifactName: "${productName}_Setup_${version}.${ext}"

directories:
  output: "build"

publish:
  provider: "github"
  owner: "${env.GH_OWNER}"
  repo: "${env.GH_REPO}"
  token: "${env.GH_TOKEN}"
  private: true
  releaseType: "prerelease"
